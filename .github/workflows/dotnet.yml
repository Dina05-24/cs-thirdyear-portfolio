name: .NET CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    
    # 1. This ensures ALL run commands execute in the correct folder
    defaults:
      run:
        working-directory: Skills/CI_CD/trying

    steps:
    # 2. Updated to v4 to fix Node.js 20 deprecation warnings
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore